services:
  prometheus:
    image: prom/prometheus
    container_name: i_commerce_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - monitoring

    grafana:
      image: grafana/grafana
      container_name: i_commerce_grafana
      ports:
        - "3000:3000"
      networks:
        - monitoring
      environment:
        - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}

    influxdb:
      image: influxdb:1.8
      container_name: i_commerce_influxdb
      ports:
        - "8086:8086" # 로컬 k6 부하툴이 데이터를 밀어 넣을 공간
      volumes:
        - influxdb-data:/var/lib/influxdb
      environment:
        - INFLUXDB_DB=k6
        - INFLUXDB_ADMIN_ENABLED=true
        - INFLUXDB_ADMIN_USER=admin
        - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-admin}
        - INFLUXDB_HTTP_MAX_BODY_SIZE=0
      networks:
        - monitoring
      deploy:
        resources:
          limits:
            cpus: '2.0'
            memory: 2000M

    mock-toss-server:
      image: wiremock/wiremock:latest
      container_name: mock-toss-server
      ports:
        - "8089:8080" # AWS의 App이 내 컴퓨터의 가짜 토스 서버를 호출할 문
      command:
        - --global-response-templating
      restart: unless-stopped
      networks:
        - monitoring
      deploy:
        resources:
          limits:
            cpus: '1.5'
            memory: 1000M

volumes:
  influxdb-data:

networks:
  monitoring: