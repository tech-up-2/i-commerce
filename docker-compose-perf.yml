version: '3.8'
name: i-commerce-monitoring

services:
  # --------------------------------------------------------------------------
  # 1. Prometheus-perf (부하테스트 전용 메트릭 수집기)
  # --------------------------------------------------------------------------
  prometheus-perf:
    image: prom/prometheus
    container_name: i_commerce_prometheus_perf
    volumes:
      - ./prometheus-perf.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9091:9090"
    networks:
      - monitoring-perf

  # --------------------------------------------------------------------------
  # 2. Grafana-perf (부하테스트 전용 시각화 대시보드)
  # --------------------------------------------------------------------------
  grafana-perf:
    image: grafana/grafana
    container_name: i_commerce_grafana_perf
    ports:
      - "3001:3000"
    networks:
      - monitoring-perf
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}

  # --------------------------------------------------------------------------
  # 3. InfluxDB-perf (k6 부하 테스트 데이터 저장용 전용 DB)
  # --------------------------------------------------------------------------
  influxdb-perf:
    image: influxdb:1.8
    container_name: i_commerce_influxdb_perf
    ports:
      - "8087:8086"
    volumes:
      - influxdb-data-perf:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_ENABLED=true
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-admin}
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
    networks:
      - monitoring-perf
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2000M

volumes:
  influxdb-data-perf:

networks:
  monitoring-perf:
