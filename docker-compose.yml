services:
  postgres:
    image: postgres:18
    container_name: i_commerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: i_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql


volumes:
  postgres_volume: