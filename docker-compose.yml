services:
  # 1. API 서버 (Spring Boot - bootBuildImage 기반)
  app:
    image: i-commerce:latest
    container_name: i_commerce_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - monitoring
    # 🌟 API 서버 자원 최적 할당
    deploy:
      resources:
        limits:
          cpus: '3.0'        # 500 RPS 스레드 연산을 위한 3코어 할당
          memory: 4000M

  postgres:
    build:
      dockerfile: ./docker/postgres/Dockerfile
      args:
        PG_BIGM_VERSION: "1.2-20250903"
    container_name: i_commerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: i_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '2.0'        # 복잡한 쿼리 및 동시성 락(Lock) 처리를 위해 2코어 할당
          memory: 4000M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: i_commerce_postgres_exporter
    restart: unless-stopped
    environment:
      # 내부 컨테이너 통신이므로 포트는 5433이 아닌 5432를 사용합니다.
      DATA_SOURCE_NAME: "postgresql://postgres:1234@i_commerce_postgres:5432/i_commerce?sslmode=disable"
    networks:
      - monitoring
    ports:
      - "9187:9187"
    depends_on:
      - postgres
  # 3. Redis 캐시 서버 (추후 도입 대비 - 필요할 때 주석 해제)
  # redis:
  #   image: redis:7-alpine
  #   container_name: i_commerce_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - monitoring
  #   # 🌟 Redis 자원 최적 할당
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '1.0'        # 싱글 스레드 기반이므로 1코어면 충분
  #         memory: 1000M      # 고속 조회 및 세션 캐싱용 1GB 할당

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_ENABLED=true
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-admin}
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
    networks:
      monitoring:
    deploy:
      resources:
        limits:
          cpus: '2.0'        # k6가 쏟아내는 초당 수천 개의 시계열 데이터 저장용 2코어
          memory: 2000M

volumes:
  postgres_volume:
  influxdb-data:

networks:
  monitoring: